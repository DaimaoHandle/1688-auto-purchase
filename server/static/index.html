<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1688 采购管理系统</title>
<link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/element-plus"></script>
<script src="https://unpkg.com/@element-plus/icons-vue"></script>
<style>
html, body, #app { height: 100%; margin: 0; }
.layout { height: 100%; display: flex; }
.sidebar { width: 220px; background: #1d1e2c; display: flex; flex-direction: column; }
.sidebar .logo { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar .logo h1 { color: #fff; font-size: 16px; font-weight: 600; margin: 0; }
.sidebar .logo p { color: #666; font-size: 11px; margin: 4px 0 0; }
.sidebar .el-menu { border-right: none; flex: 1; }
.main { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; overflow: hidden; }
.topbar { height: 56px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); z-index: 10; }
.topbar .page-title { font-size: 16px; font-weight: 600; color: #333; }
.topbar .status-bar { display: flex; gap: 16px; font-size: 13px; color: #666; }
.topbar .status-bar .num { font-weight: 600; color: #333; }
.content { flex: 1; padding: 20px; overflow-y: auto; }
.node-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 16px; }
.node-card { border-radius: 8px; }
.node-card .el-card__body { padding: 20px; }
.card-header { display: flex; justify-content: space-between; align-items: center; }
.card-header .name { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.card-header .id { font-size: 12px; color: #999; }
.progress-section { margin-top: 12px; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 4px; }
.log-box { margin-top: 12px; background: #1a1a2e; border-radius: 6px; padding: 10px; max-height: 220px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.7; }
.log-box .log-line { color: #a5b4fc; }
.log-box .log-line.WARNING { color: #fbbf24; }
.log-box .log-line.ERROR { color: #f87171; }
.log-box .log-line.INFO { color: #a5b4fc; }
.config-form .el-form-item { margin-bottom: 16px; }
.upload-zone { border: 2px dashed #dcdfe6; border-radius: 6px; padding: 24px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
.upload-zone:hover { border-color: #409eff; }
.upload-zone.uploaded { border-color: #67c23a; }
.upload-zone img { max-height: 120px; max-width: 100%; margin-top: 8px; border-radius: 4px; }
</style>
</head>
<body>
<div id="app">
<div class="layout">
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="logo">
            <h1>1688 采购系统</h1>
            <p>Multi-Server Manager</p>
        </div>
        <el-menu :default-active="currentPage" background-color="#1d1e2c" text-color="#8c8fa0" active-text-color="#409eff" @select="onMenuSelect">
            <el-menu-item index="dashboard">
                <el-icon><Monitor /></el-icon>
                <span>总览</span>
            </el-menu-item>
            <el-menu-item index="nodes">
                <el-icon><Connection /></el-icon>
                <span>节点管理</span>
            </el-menu-item>
            <el-menu-item index="tasks">
                <el-icon><List /></el-icon>
                <span>任务中心</span>
            </el-menu-item>
            <el-menu-item index="data">
                <el-icon><DataAnalysis /></el-icon>
                <span>数据中心</span>
            </el-menu-item>
            <el-menu-item index="settings">
                <el-icon><Setting /></el-icon>
                <span>系统设置</span>
            </el-menu-item>
        </el-menu>
    </div>

    <!-- 主区域 -->
    <div class="main">
        <!-- 顶部导航 -->
        <div class="topbar">
            <div class="page-title">{{ pageTitle }}</div>
            <div class="status-bar">
                <span>节点 <span class="num">{{ nodeList.length }}</span></span>
                <span>在线 <span class="num" style="color:#67c23a">{{ onlineCount }}</span></span>
                <span>运行中 <span class="num" style="color:#409eff">{{ activeCount }}</span></span>
            </div>
        </div>

        <!-- 内容区 -->
        <div class="content">

            <!-- 控制台页面 -->
            <template v-if="currentPage === 'dashboard'">
                <div style="margin-bottom: 16px; text-align: right">
                    <el-button type="primary" @click="showAddNode = true">
                        <el-icon><Plus /></el-icon> 添加节点
                    </el-button>
                </div>
                <el-empty v-if="nodeList.length === 0" description="暂无节点，请先添加"></el-empty>
                <div class="node-grid" v-else>
                    <el-card class="node-card" v-for="n in nodeList" :key="n.id" shadow="hover">
                        <div class="card-header">
                            <div class="name">
                                <el-badge is-dot :type="n.online ? 'success' : 'danger'" />
                                {{ n.name || n.id }}
                            </div>
                            <div class="id">{{ n.id }}</div>
                        </div>

                        <el-tag :type="statusType(n)" size="small" style="margin-top: 10px">
                            {{ statusLabel(n) }}
                        </el-tag>

                        <!-- 进度 -->
                        <div class="progress-section" v-if="n.task_progress && n.task_status === 'filling_cart'">
                            <div class="progress-label">
                                <span>已加购 {{ n.task_progress.items_added || 0 }} 件</span>
                                <span>¥{{ (n.task_progress.local_amount || 0).toFixed(2) }} / ¥{{ n.task_progress.target_amount || 0 }}</span>
                            </div>
                            <el-progress :percentage="progressPct(n)" :show-text="false" :stroke-width="8" />
                        </div>

                        <!-- 操作按钮 -->
                        <div style="margin-top: 14px; display: flex; gap: 6px; flex-wrap: wrap">
                            <el-button size="small" @click="openConfig(n)">配置</el-button>
                            <template v-if="!n.online">
                                <el-tag type="info" size="small">离线</el-tag>
                            </template>
                            <template v-else-if="!n.task_status || ['idle','completed','failed','cancelled'].includes(n.task_status)">
                                <el-button type="success" size="small" @click="startTask(n.id)">启动</el-button>
                            </template>
                            <template v-else-if="n.task_status === 'awaiting_approval'">
                                <el-button type="success" size="small" @click="approveCheckout(n.task_id)">确认结算</el-button>
                                <el-button type="danger" size="small" @click="rejectCheckout(n.task_id)">取消结算</el-button>
                            </template>
                            <template v-else>
                                <el-button type="danger" size="small" @click="stopTask(n.id)">停止</el-button>
                            </template>
                            <el-button size="small" :type="showLogs[n.id] ? 'primary' : ''" @click="toggleLog(n.id)" plain>
                                日志
                            </el-button>
                        </div>

                        <!-- 日志面板 -->
                        <div class="log-box" v-if="showLogs[n.id]" :ref="el => logRefs[n.id] = el">
                            <div class="log-line" :class="l.level" v-for="(l, i) in (nodeLogs[n.id] || []).slice(-100)" :key="i">
                                {{ l.message }}
                            </div>
                        </div>
                    </el-card>
                </div>
            </template>

            <!-- 节点管理页面 -->
            <template v-if="currentPage === 'nodes'">
                <el-table :data="nodeList" stripe>
                    <el-table-column prop="id" label="节点ID" width="100" />
                    <el-table-column prop="name" label="名称" />
                    <el-table-column label="状态" width="100">
                        <template #default="{row}">
                            <el-tag :type="row.online ? 'success' : 'info'" size="small">
                                {{ row.online ? '在线' : '离线' }}
                            </el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column label="任务状态" width="140">
                        <template #default="{row}">
                            <el-tag v-if="row.task_status" :type="statusType(row)" size="small">
                                {{ statusLabel(row) }}
                            </el-tag>
                            <span v-else style="color:#999">-</span>
                        </template>
                    </el-table-column>
                    <el-table-column label="操作" width="200">
                        <template #default="{row}">
                            <el-button size="small" @click="openConfig(row)">配置</el-button>
                            <el-button size="small" type="danger" @click="deleteNode(row.id)">删除</el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </template>

            <!-- 任务中心 -->
            <template v-if="currentPage === 'tasks'">
                <el-empty description="任务中心开发中" />
            </template>

            <!-- 系统设置 -->
            <template v-if="currentPage === 'settings'">
                <el-empty description="系统设置开发中" />
            </template>

            <!-- 数据中心 -->
            <template v-if="currentPage === 'data'">
                <!-- 统计卡片 -->
                <div style="display:flex;gap:16px;margin-bottom:20px">
                    <el-card style="flex:1" shadow="hover">
                        <div style="text-align:center">
                            <div style="font-size:28px;font-weight:700;color:#409eff">{{ reportSummary.total_tasks }}</div>
                            <div style="font-size:13px;color:#999;margin-top:4px">总任务数</div>
                        </div>
                    </el-card>
                    <el-card style="flex:1" shadow="hover">
                        <div style="text-align:center">
                            <div style="font-size:28px;font-weight:700;color:#67c23a">{{ reportSummary.total_items }}</div>
                            <div style="font-size:13px;color:#999;margin-top:4px">总加购商品</div>
                        </div>
                    </el-card>
                    <el-card style="flex:1" shadow="hover">
                        <div style="text-align:center">
                            <div style="font-size:28px;font-weight:700;color:#e6a23c">{{ reportSummary.total_orders }}</div>
                            <div style="font-size:13px;color:#999;margin-top:4px">总生成订单</div>
                        </div>
                    </el-card>
                    <el-card style="flex:1" shadow="hover">
                        <div style="text-align:center">
                            <div style="font-size:28px;font-weight:700;color:#f56c6c">&yen;{{ (reportSummary.total_amount || 0).toFixed(2) }}</div>
                            <div style="font-size:13px;color:#999;margin-top:4px">总采购金额</div>
                        </div>
                    </el-card>
                </div>

                <!-- 按节点统计 -->
                <el-card shadow="never" style="margin-bottom:20px" v-if="reportSummary.by_node && reportSummary.by_node.length > 1">
                    <template #header><span style="font-size:14px;font-weight:600">节点统计</span></template>
                    <el-table :data="reportSummary.by_node" size="small">
                        <el-table-column prop="node_name" label="节点" />
                        <el-table-column prop="tasks" label="任务数" width="80" />
                        <el-table-column prop="items" label="加购商品" width="90" />
                        <el-table-column prop="orders" label="订单数" width="80" />
                        <el-table-column label="采购金额" width="120" align="right">
                            <template #default="{row}"><span>&yen;{{ (row.amount || 0).toFixed(2) }}</span></template>
                        </el-table-column>
                    </el-table>
                </el-card>

                <!-- 报告列表 -->
                <el-card shadow="never">
                    <template #header>
                        <div style="display:flex;justify-content:space-between;align-items:center">
                            <span style="font-size:14px;font-weight:600">采购记录</span>
                            <div style="display:flex;gap:8px;align-items:center">
                                <el-select v-model="reportFilter" placeholder="全部节点" clearable size="small" style="width:180px" @change="loadReports">
                                    <el-option v-for="n in nodeList" :key="n.id" :label="n.name || n.id" :value="n.id" />
                                </el-select>
                                <el-button size="small" type="success" @click="exportReports">
                                    <el-icon><Download /></el-icon> 导出
                                </el-button>
                            </div>
                        </div>
                    </template>
                    <el-table :data="reportList" size="small" v-loading="reportLoading" border stripe>
                        <el-table-column prop="created_at" label="采购日期" width="170" />
                        <el-table-column prop="shop_name" label="店铺" min-width="160">
                            <template #default="{row}">{{ row.shop_name || '-' }}</template>
                        </el-table-column>
                        <el-table-column prop="operator" label="操作人" width="100">
                            <template #default="{row}">{{ row.operator || '-' }}</template>
                        </el-table-column>
                        <el-table-column prop="buyer_info" label="买手信息" width="160">
                            <template #default="{row}">{{ row.buyer_info || '-' }}</template>
                        </el-table-column>
                        <el-table-column prop="orders_created" label="订单笔数" width="90" align="center" />
                        <el-table-column label="采购金额" width="100" align="right">
                            <template #default="{row}">
                                <span style="color:#e6a23c;font-weight:600">{{ row.actual_amount ? '\u00a5' + row.actual_amount.toFixed(2) : '-' }}</span>
                            </template>
                        </el-table-column>
                        <el-table-column label="计划金额" width="100" align="right">
                            <template #default="{row}">
                                <span>\u00a5{{ (row.target_amount || 0).toFixed(2) }}</span>
                            </template>
                        </el-table-column>
                        <el-table-column prop="items_added" label="加购数" width="70" align="center" />
                        <el-table-column label="状态" width="70" align="center">
                            <template #default="{row}">
                                <el-tag v-if="row.errors && row.errors.length" type="danger" size="small">异常</el-tag>
                                <el-tag v-else type="success" size="small">正常</el-tag>
                            </template>
                        </el-table-column>
                    </el-table>
                    <el-empty v-if="!reportLoading && reportList.length === 0" description="暂无采购记录" />
                </el-card>
            </template>

        </div>
    </div>
</div>

<!-- 添加节点弹窗 -->
<el-dialog v-model="showAddNode" title="添加节点" width="420px">
    <el-form label-width="80px">
        <el-form-item label="节点名称">
            <el-input v-model="newNodeName" placeholder="如：服务器A-张三" />
        </el-form-item>
    </el-form>
    <template #footer>
        <el-button @click="showAddNode = false">取消</el-button>
        <el-button type="primary" @click="addNode">创建</el-button>
    </template>
</el-dialog>

<!-- 节点创建结果弹窗 -->
<el-dialog v-model="showNodeResult" title="节点创建成功" width="500px">
    <el-alert type="success" :closable="false" style="margin-bottom: 16px">
        请将以下配置填入采购服务器的 agent/agent_config.json
    </el-alert>
    <pre style="background:#1a1a2e;color:#67c23a;padding:16px;border-radius:6px;font-size:13px;overflow-x:auto">{{ nodeResultJson }}</pre>
    <template #footer>
        <el-button @click="copyNodeResult">复制配置</el-button>
        <el-button type="primary" @click="showNodeResult = false">确定</el-button>
    </template>
</el-dialog>

<!-- 配置编辑弹窗 -->
<el-dialog v-model="showConfig" :title="configTitle" width="520px">
    <el-form label-width="110px" class="config-form">
        <el-form-item label="搜索图片">
            <div class="upload-zone" :class="{uploaded: configForm.imagePreview}"
                 @click="$refs.fileInput.click()"
                 @dragover.prevent="$event.currentTarget.style.borderColor='#409eff'"
                 @dragleave.prevent="$event.currentTarget.style.borderColor='#dcdfe6'"
                 @drop.prevent="onDrop($event)">
                <template v-if="configForm.imagePreview">
                    <img :src="configForm.imagePreview" />
                </template>
                <template v-else>
                    <el-icon :size="32" color="#c0c4cc"><UploadFilled /></el-icon>
                    <p style="color:#909399;font-size:13px;margin:8px 0 0">点击上传 / Ctrl+V 粘贴 / 拖拽图片</p>
                </template>
            </div>
            <input ref="fileInput" type="file" accept="image/*" style="display:none" @change="onFileChange">
            <el-select v-model="configForm.selectedImage" placeholder="或选择已上传的图片" style="margin-top:8px;width:100%" @change="onSelectExisting">
                <el-option v-for="img in imageList" :key="img.id" :label="img.filename + ' (' + Math.round(img.size/1024) + 'KB)'" :value="img.id" />
            </el-select>
        </el-form-item>
        <el-form-item label="目标店铺">
            <el-input v-model="configForm.shopName" placeholder="店铺名称（支持部分匹配）" />
        </el-form-item>
        <el-form-item label="采购目标金额">
            <el-input-number v-model="configForm.targetAmount" :min="100" :step="500" style="width:100%" />
        </el-form-item>
        <el-form-item label="每单限额">
            <el-input-number v-model="configForm.orderLimit" :min="100" :step="100" style="width:100%" />
        </el-form-item>
        <el-form-item label="运费预留">
            <el-input-number v-model="configForm.shippingReserve" :min="0" :step="5" style="width:100%" />
        </el-form-item>
        <el-form-item label="最大加购数">
            <el-input-number v-model="configForm.maxItems" :min="1" :step="50" style="width:100%" />
        </el-form-item>
    </el-form>
    <template #footer>
        <el-button @click="showConfig = false">取消</el-button>
        <el-button type="primary" @click="saveConfig">保存配置</el-button>
    </template>
</el-dialog>

</div>

<script>
const { createApp, ref, computed, reactive, nextTick, onMounted, watch } = Vue;

const app = createApp({
    setup() {
        const currentPage = ref('dashboard');
        const nodes = reactive({});
        const nodeLogs = reactive({});
        const showLogs = reactive({});
        const logRefs = reactive({});

        // 添加节点
        const showAddNode = ref(false);
        const newNodeName = ref('');
        const showNodeResult = ref(false);
        const nodeResultJson = ref('');

        // 配置
        const showConfig = ref(false);
        const configTitle = ref('');
        const configNodeId = ref('');
        const imageList = ref([]);
        const configForm = reactive({
            shopName: '', targetAmount: 2000, orderLimit: 500,
            shippingReserve: 15, maxItems: 200, imageId: null,
            selectedImage: '', imagePreview: null,
        });

        const STATUS_LABELS = {
            idle:'空闲', starting:'启动中', waiting_login:'等待登录',
            logged_in:'已登录', searching:'搜图中', entering_shop:'进入店铺',
            filling_cart:'加购中', cart_filled:'加购完成',
            awaiting_approval:'等待确认结算', checking_out:'结算中',
            completed:'已完成', failed:'异常', cancelled:'已取消',
        };

        const pageTitle = computed(() => ({dashboard:'总览', nodes:'节点管理', tasks:'任务中心', data:'数据中心', settings:'系统设置'}[currentPage.value] || ''));
        const nodeList = computed(() => Object.values(nodes));
        const onlineCount = computed(() => nodeList.value.filter(n => n.online).length);
        const activeCount = computed(() => nodeList.value.filter(n => n.online && n.task_status && !['idle','completed','failed','cancelled'].includes(n.task_status)).length);

        function statusLabel(n) {
            if (!n.online) return '离线';
            return STATUS_LABELS[n.task_status] || '空闲';
        }
        function statusType(n) {
            if (!n.online) return 'info';
            const s = n.task_status;
            if (s === 'awaiting_approval') return 'warning';
            if (s === 'failed') return 'danger';
            if (s === 'completed') return 'success';
            if (s && s !== 'idle') return 'primary';
            return 'info';
        }
        function progressPct(n) {
            if (!n.task_progress || !n.task_progress.target_amount) return 0;
            return Math.min(100, (n.task_progress.local_amount / n.task_progress.target_amount) * 100);
        }

        // WebSocket
        let ws = null;
        function connectWS() {
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(proto + '://' + location.host + '/ws/dashboard');
            ws.onclose = () => setTimeout(connectWS, 3000);
            ws.onmessage = (e) => { try { handleMsg(JSON.parse(e.data)); } catch(err){} };
        }
        function handleMsg(msg) {
            const p = msg.payload || {};
            const nid = p.node_id;
            if (!nid) return;
            if (!nodes[nid]) nodes[nid] = {id:nid, name:p.name||nid, online:false, task_status:null, task_progress:null, task_id:null};
            // 只用非空 name 更新（避免 WS 消息中缺 name 时覆盖已有值）
            if (p.name) nodes[nid].name = p.name;
            if (!nodeLogs[nid]) nodeLogs[nid] = [];

            if (msg.type === 'status_update') {
                if (p.status === 'online') { nodes[nid].online = true; }
                else if (p.status === 'offline') { nodes[nid].online = false; nodes[nid].task_status = null; }
                else { nodes[nid].task_status = p.status; if (p.task_id) nodes[nid].task_id = p.task_id; }
            } else if (msg.type === 'progress_update') {
                nodes[nid].task_progress = p; nodes[nid].task_status = 'filling_cart';
                if (p.task_id) nodes[nid].task_id = p.task_id;
            } else if (msg.type === 'log_entry') {
                nodeLogs[nid].push(p);
                if (nodeLogs[nid].length > 200) nodeLogs[nid].splice(0, nodeLogs[nid].length - 200);
                nextTick(() => { const el = logRefs[nid]; if (el) el.scrollTop = el.scrollHeight; });
            } else if (msg.type === 'task_report') {
                nodes[nid].task_status = 'completed';
            }
        }

        // API calls
        async function loadNodes() {
            try {
                const res = await fetch('/api/nodes');
                const list = await res.json();
                list.forEach(n => { nodes[n.id] = {id:n.id, name:n.name, online:n.online, task_status:n.task_status, task_progress:n.task_progress, task_id:null}; });
            } catch(e) {}
        }

        async function addNode() {
            try {
                const res = await fetch('/api/nodes/tokens', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:newNodeName.value||''})});
                const data = await res.json();
                nodeResultJson.value = JSON.stringify({server_url:'ws://'+location.host+'/ws/agent', node_id:data.node_id, token:data.token}, null, 2);
                showAddNode.value = false;
                showNodeResult.value = true;
                newNodeName.value = '';
                loadNodes();
            } catch(e) { ElementPlus.ElMessage.error('创建失败'); }
        }

        function copyNodeResult() {
            navigator.clipboard.writeText(nodeResultJson.value);
            ElementPlus.ElMessage.success('已复制');
        }

        async function deleteNode(id) {
            try { await ElementPlus.ElMessageBox.confirm('确认删除此节点？', '删除'); } catch { return; }
            await fetch('/api/nodes/' + id, {method:'DELETE'});
            delete nodes[id];
        }

        async function startTask(nodeId) {
            try {
                const res = await fetch('/api/tasks/nodes/' + nodeId + '/start', {method:'POST'});
                if (!res.ok) { const d = await res.json(); ElementPlus.ElMessage.error(d.detail || '启动失败'); }
            } catch(e) { ElementPlus.ElMessage.error(e.message); }
        }
        async function stopTask(nodeId) {
            try { await ElementPlus.ElMessageBox.confirm('确认停止？', '停止任务'); } catch { return; }
            await fetch('/api/tasks/nodes/' + nodeId + '/stop', {method:'POST'});
        }
        async function approveCheckout(taskId) { await fetch('/api/tasks/' + taskId + '/approve', {method:'POST'}); }
        async function rejectCheckout(taskId) { await fetch('/api/tasks/' + taskId + '/reject', {method:'POST'}); }

        function toggleLog(nid) { showLogs[nid] = !showLogs[nid]; }

        // 配置
        async function openConfig(n) {
            configNodeId.value = n.id;
            configTitle.value = (n.name || n.id) + ' - 配置';
            configForm.imagePreview = null;
            configForm.selectedImage = '';
            configForm.imageId = null;
            try {
                const [cfgRes, imgRes] = await Promise.all([
                    fetch('/api/nodes/' + n.id + '/config'),
                    fetch('/api/images')
                ]);
                const cfgData = await cfgRes.json();
                imageList.value = await imgRes.json();
                const cfg = cfgData.config || {};
                configForm.shopName = (cfg.search||{}).target_shop_name || '';
                configForm.targetAmount = (cfg.cart||{}).target_amount || 2000;
                configForm.orderLimit = (cfg.cart||{}).order_limit || 500;
                configForm.shippingReserve = (cfg.cart||{}).shipping_reserve || 15;
                configForm.maxItems = (cfg.cart||{}).max_items || 200;
                if (cfgData.image_id) { configForm.selectedImage = cfgData.image_id; configForm.imageId = cfgData.image_id; }
            } catch(e) {}
            showConfig.value = true;
        }

        async function uploadFile(file) {
            const fd = new FormData();
            fd.append('file', file, file.name || 'paste.png');
            try {
                const res = await fetch('/api/images', {method:'POST', body:fd});
                const data = await res.json();
                configForm.imageId = data.id;
                configForm.selectedImage = '';
                const reader = new FileReader();
                reader.onload = (e) => { configForm.imagePreview = e.target.result; };
                reader.readAsDataURL(file);
                const imgRes = await fetch('/api/images');
                imageList.value = await imgRes.json();
                ElementPlus.ElMessage.success('图片已上传');
            } catch(e) { ElementPlus.ElMessage.error('上传失败'); }
        }

        function onFileChange(e) { if (e.target.files[0]) uploadFile(e.target.files[0]); }
        function onDrop(e) { if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]); }
        function onSelectExisting(val) { configForm.imageId = val; configForm.imagePreview = null; }

        async function saveConfig() {
            const config = {
                browser: {type:'chromium', headless:false, slow_mo:100, profile_dir:'~/1688/browser_profile'},
                search: {image_path:'', target_shop_name:configForm.shopName},
                cart: {target_amount:configForm.targetAmount, amount_strategy:'not_exceed', max_items:configForm.maxItems, order_limit:configForm.orderLimit, shipping_reserve:configForm.shippingReserve},
                timeouts: {page_load:30000, element_wait:10000, login_wait:120000},
                logging: {level:'INFO', file:'logs/app.log'},
            };
            try {
                const res = await fetch('/api/nodes/' + configNodeId.value + '/config', {
                    method:'PUT', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({config, image_id: configForm.imageId})
                });
                if (res.ok) { ElementPlus.ElMessage.success('配置已保存'); showConfig.value = false; }
                else { const d = await res.json(); ElementPlus.ElMessage.error(d.detail || '保存失败'); }
            } catch(e) { ElementPlus.ElMessage.error(e.message); }
        }

        // 报告
        const reportSummary = reactive({total_tasks:0, total_items:0, total_orders:0, by_node:[]});
        const reportList = ref([]);
        const reportFilter = ref('');
        const reportLoading = ref(false);

        function exportReports() {
            const params = reportFilter.value ? '?node_id=' + reportFilter.value : '';
            window.open('/api/reports/export' + params, '_blank');
        }

        async function loadReports() {
            reportLoading.value = true;
            try {
                const params = reportFilter.value ? '?node_id=' + reportFilter.value : '';
                const [listRes, summaryRes] = await Promise.all([
                    fetch('/api/reports' + params),
                    fetch('/api/reports/summary')
                ]);
                reportList.value = await listRes.json();
                const s = await summaryRes.json();
                Object.assign(reportSummary, s);
            } catch(e) {} finally { reportLoading.value = false; }
        }

        // 粘贴
        window.addEventListener('paste', (e) => {
            if (!showConfig.value) return;
            const items = (e.clipboardData || {}).items;
            if (!items) return;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const file = items[i].getAsFile();
                    if (file) { uploadFile(file); e.preventDefault(); return; }
                }
            }
        }, true);

        function onMenuSelect(index) {
            currentPage.value = index;
            if (index === 'data') loadReports();
        }

        onMounted(() => { loadNodes(); connectWS(); });

        return {
            currentPage, pageTitle, nodeList, onlineCount, activeCount,
            showLogs, nodeLogs, logRefs, toggleLog,
            statusLabel, statusType, progressPct,
            showAddNode, newNodeName, addNode,
            showNodeResult, nodeResultJson, copyNodeResult,
            deleteNode, startTask, stopTask, approveCheckout, rejectCheckout,
            showConfig, configTitle, configForm, imageList,
            openConfig, saveConfig, onFileChange, onDrop, onSelectExisting,
            reportSummary, reportList, reportFilter, reportLoading, loadReports, exportReports,
            onMenuSelect,
        };
    }
});

app.use(ElementPlus);
if (typeof ElementPlusIconsVue !== 'undefined') {
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
        app.component(key, component);
    }
}
app.mount('#app');
</script>
</body>
</html>
